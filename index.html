<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Birthday Invitation – Narcisse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:wght@300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold-light:#F0D080;--gold-shimmer:#FFE88A;--black:#0A0A0A;}
html,body{height:100%;width:100%;background:var(--black);overflow:hidden;touch-action:manipulation;}

/* ── AMBIENT ── */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.heart{position:absolute;bottom:-60px;animation:floatH linear infinite;opacity:0;}
@keyframes floatH{0%{transform:translateY(0);opacity:0}10%{opacity:0.8}90%{opacity:0.5}100%{transform:translateY(-110vh);opacity:0}}
.spark{position:absolute;border-radius:50%;background:var(--gold-shimmer);
  box-shadow:0 0 5px 2px var(--gold-shimmer);animation:sparkA ease-in-out infinite;pointer-events:none;}
@keyframes sparkA{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:10;transition:opacity 0.5s ease;}
.screen.hidden{opacity:0;pointer-events:none;}

/* ══════════════════════
   SCREEN 1 — ENVELOPE
   Full phone size, opens from top
══════════════════════ */
#s1{display:flex;align-items:center;justify-content:center;background:var(--black);}

.env-scene{
  /* full phone viewport */
  width:100vw;
  height:100vh;
  position:relative;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}

/* The envelope image fills the whole screen */
.env-img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  position:absolute;
  inset:0;
  transition:transform 0.15s ease;
}

/* TOP FLAP — covers top portion, lifts open */
.env-flap{
  position:absolute;
  top:0; left:0; right:0;
  height:52%; /* covers top half */
  transform-origin:top center;
  transform:rotateX(0deg);
  transition:transform 0.9s cubic-bezier(0.4,0,0.2,1);
  z-index:3;
  background:transparent;
  overflow:hidden;
  /* 3D perspective for the flap */
  perspective:800px;
}
.env-flap-img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
  transform-origin:top center;
  transition:transform 0.9s cubic-bezier(0.4,0,0.2,1);
}

/* opened state */
.env-scene.opened .env-flap-img{
  transform:rotateX(-160deg);
  transition:transform 0.9s cubic-bezier(0.4,0,0.2,1);
}

/* glow line where flap meets body */
.env-fold-line{
  position:absolute;
  top:52%;
  left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.6),transparent);
  z-index:4;
  opacity:0;
  transition:opacity 0.3s ease;
}
.env-scene.opened .env-fold-line{opacity:1;}

/* letter rising from envelope */
.env-letter{
  position:absolute;
  left:10%;right:10%;
  bottom:5%;
  height:45%;
  border-radius:10px 10px 0 0;
  background:linear-gradient(160deg,#F7EED8,#EFE3C0);
  box-shadow:0 -8px 30px rgba(0,0,0,0.4);
  transform:translateY(100%);
  transition:transform 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.5s;
  z-index:2;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;
}
.env-scene.opened .env-letter{transform:translateY(0);}
.env-letter-text{
  font-family:"Dancing Script",cursive;
  font-size:clamp(18px,6vw,26px);
  color:#5C1A1A;
  text-align:center;
  padding:0 16px;
}
.env-letter-sub{
  font-family:"Playfair Display",serif;
  font-size:clamp(9px,2.5vw,12px);
  letter-spacing:0.3em;
  color:rgba(92,26,26,0.6);
  text-transform:uppercase;
}

/* tap hint overlay */
.tap-hint{
  position:absolute;
  bottom:30px;left:0;right:0;
  text-align:center;
  font-family:"Playfair Display",serif;
  font-size:11px;letter-spacing:0.28em;
  color:rgba(201,168,76,0.7);
  text-transform:uppercase;
  z-index:5;
  animation:tapP 2.2s ease-in-out infinite;
  text-shadow:0 0 10px rgba(0,0,0,0.8);
}
@keyframes tapP{0%,100%{opacity:0.3}50%{opacity:1}}

/* ══════════════════════
   SCREEN 2 — PIN
══════════════════════ */
#s2{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:var(--black);}

.pin-card{
  width:min(92vw,400px);
  background:linear-gradient(160deg,#0D0D0D,#111);
  border:1px solid rgba(201,168,76,0.35);border-radius:24px;
  padding:24px 20px 20px;
  box-shadow:0 0 0 1px rgba(201,168,76,0.07),0 30px 80px rgba(0,0,0,0.85),inset 0 1px 0 rgba(201,168,76,0.15);
  position:relative;overflow:hidden;
}
.pin-card::before,.pin-card::after{content:"";position:absolute;width:52px;height:52px;border-color:var(--gold);border-style:solid;opacity:0.3;}
.pin-card::before{top:10px;left:10px;border-width:1px 0 0 1px;border-radius:5px 0 0 0;}
.pin-card::after{bottom:10px;right:10px;border-width:0 1px 1px 0;border-radius:0 0 5px 0;}
.pc-tr,.pc-bl{position:absolute;width:52px;height:52px;border-color:var(--gold);border-style:solid;opacity:0.3;}
.pc-tr{top:10px;right:10px;border-width:1px 1px 0 0;border-radius:0 5px 0 0;}
.pc-bl{bottom:10px;left:10px;border-width:0 0 1px 1px;border-radius:0 0 0 5px;}

.ph{position:absolute;pointer-events:none;animation:phF ease-in-out infinite;}
@keyframes phF{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

.pin-bow{display:flex;justify-content:center;margin-bottom:8px;}
.pin-bow svg{width:60px;filter:drop-shadow(0 0 10px rgba(201,168,76,0.5));animation:bF 3s ease-in-out infinite;}
@keyframes bF{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

.pin-title{font-family:"Playfair Display",serif;font-size:10px;letter-spacing:0.32em;color:rgba(201,168,76,0.65);text-align:center;text-transform:uppercase;margin-bottom:2px;}
.pin-sub{font-family:"Dancing Script",cursive;font-size:clamp(20px,6vw,28px);color:var(--gold-light);text-align:center;margin-bottom:16px;text-shadow:0 0 18px rgba(201,168,76,0.35);}

.pin-dots{display:flex;justify-content:center;gap:9px;margin-bottom:5px;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid rgba(201,168,76,0.4);background:transparent;transition:all 0.2s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 7px rgba(201,168,76,0.6);}
.pin-dot.err{border-color:#FF4444;background:#FF4444;animation:shk 0.4s ease;}
@keyframes shk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}

.pin-msg{font-size:10px;color:rgba(201,168,76,0.38);text-align:center;letter-spacing:0.1em;margin-bottom:14px;min-height:14px;font-family:"Cormorant Garamond",serif;}
.pin-msg.e{color:#FF4444}.pin-msg.ok{color:var(--gold)}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.key{aspect-ratio:1;border-radius:50%;border:1px solid rgba(201,168,76,0.25);background:rgba(201,168,76,0.03);color:var(--gold-light);font-family:"Playfair Display",serif;font-size:clamp(16px,5vw,20px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.13s;-webkit-tap-highlight-color:transparent;user-select:none;}
.key:active{background:rgba(201,168,76,0.15);border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,0.25);transform:scale(0.9);}
.key.empty{border:none;background:none;cursor:default;pointer-events:none;}
.key.del svg{width:18px;height:18px;stroke:var(--gold-light);}

/* ══════════════════════
   SCREEN 3 — INVITE
══════════════════════ */
#s3{display:flex;align-items:center;justify-content:center;padding:12px;overflow-y:auto;background:var(--black);}
.inv-wrap{width:min(88vw,380px);border-radius:18px;overflow:hidden;box-shadow:0 25px 70px rgba(0,0,0,0.8),0 0 0 1px rgba(201,168,76,0.25);animation:invR 0.8s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes invR{from{opacity:0;transform:scale(0.78) translateY(28px)}to{opacity:1;transform:none}}
.inv-wrap img{width:100%;display:block;}
</style>
</head>

<script>
// AMBIENT
const bg=document.getElementById('bg');
function mH(){
  const id='h'+Math.random().toString(36).slice(2);
  const sz=12+Math.random()*20;
  const w=document.createElement('div');w.className='heart';
  w.style.left=Math.random()*100+'%';
  const d=7+Math.random()*8;
  w.style.animationDuration=d+'s';w.style.animationDelay=(Math.random()*d)+'s';
  w.innerHTML='<svg width="'+sz+'" height="'+(sz*.93)+'" viewBox="0 0 30 28"><defs><radialGradient id="'+id+'" cx="35%" cy="30%"><stop offset="0%" stop-color="#fff"/><stop offset="60%" stop-color="#e0e0ee"/><stop offset="100%" stop-color="#a8a8c0"/></radialGradient></defs><path d="M15 24S2 16 2 8a6 6 0 0 1 13-1 6 6 0 0 1 13 1c0 8-13 16-13 16z" fill="url(#'+id+')"/></svg>';
  bg.appendChild(w);setTimeout(()=>w.remove(),(d*2)*1000);
}
function mS(){
  const s=document.createElement('div');s.className='spark';
  s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
  const d=1.5+Math.random()*2,sz=2+Math.random()*4;
  s.style.width=sz+'px';s.style.height=sz+'px';
  s.style.animationDuration=d+'s';s.style.animationDelay=(Math.random()*d)+'s';
  bg.appendChild(s);setTimeout(()=>s.remove(),(d*2)*1000);
}
setInterval(mH,700);for(let i=0;i<6;i++)setTimeout(mH,i*130);
setInterval(mS,280);for(let i=0;i<14;i++)setTimeout(mS,i*70);

// ENVELOPE OPEN
let opened=false;
function openEnv(){
  if(opened)return; opened=true;
  const scene=document.getElementById('envScene');
  const hint=document.getElementById('tapHint');
  hint.style.opacity='0';
  scene.classList.add('opened');
  // after letter rises, go to PIN
  setTimeout(()=>{
    document.getElementById('s1').classList.add('hidden');
    document.getElementById('s2').classList.remove('hidden');
  },1600);
}

// PIN
const SEC='14062005';let pin='';
function upd(){for(let i=0;i<8;i++){const d=document.getElementById('d'+i);d.classList.remove('filled','err');if(i<pin.length)d.classList.add('filled');}}
function k(n){if(pin.length>=8)return;pin+=n;upd();if(pin.length===8)setTimeout(chk,250);}
function del(){if(!pin.length)return;pin=pin.slice(0,-1);upd();const m=document.getElementById('msg');m.textContent='✦   ✦   ✦';m.className='pin-msg';}
function chk(){
  const m=document.getElementById('msg');
  if(pin===SEC){
    m.textContent='✓ Bienvenue Narcisse ! ✦';m.className='pin-msg ok';
    setTimeout(()=>{document.getElementById('s2').classList.add('hidden');document.getElementById('s3').classList.remove('hidden');},700);
  } else {
    for(let i=0;i<8;i++){const d=document.getElementById('d'+i);d.classList.remove('filled');d.classList.add('err');}
    m.textContent='✗ Code incorrect — réessayez';m.className='pin-msg e';
    setTimeout(()=>{for(let i=0;i<8;i++)document.getElementById('d'+i).classList.remove('err');pin='';upd();m.textContent='✦   ✦   ✦';m.className='pin-msg';},950);
  }
}
</script>
